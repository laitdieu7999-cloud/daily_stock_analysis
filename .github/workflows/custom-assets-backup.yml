name: Custom Assets Backup

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

concurrency:
  group: custom-assets-backup-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backup-custom-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 🔎 List custom asset files
        run: |
          python scripts/backup_custom_assets.py list | tee custom-assets-files.txt

      - name: 📦 Build custom asset backup
        run: |
          mkdir -p backups
          python scripts/backup_custom_assets.py backup --output backups/custom-assets-${{ github.run_number }}.tar.gz | tee custom-assets-backup.log

      - name: 📝 Build job summary
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          files = Path("custom-assets-files.txt").read_text(encoding="utf-8").splitlines()
          archives = sorted(Path("backups").glob("custom-assets-*.tar.gz"))
          lines = [
              "# Custom Assets Backup",
              "",
              f"- Files included: `{len(files)}`",
          ]
          if archives:
              lines.append(f"- Archive: `{archives[-1].name}`")
          if files:
              lines.append("")
              lines.append("## Included Paths")
              lines.extend(f"- `{item}`" for item in files)
          summary.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: 📤 Upload file list
        uses: actions/upload-artifact@v6
        with:
          name: custom-assets-files-${{ github.run_number }}
          path: custom-assets-files.txt

      - name: 📤 Upload backup archive
        uses: actions/upload-artifact@v6
        with:
          name: custom-assets-backup-${{ github.run_number }}
          path: |
            backups/custom-assets-*.tar.gz
            custom-assets-backup.log
          if-no-files-found: error
