name: geopolitical_risk_alert
display_name: 地缘宏观预警系统
description: |
  多模块地缘政治与宏观经济风险预警框架，整合大宗商品异常监控、VIX恐慌指数、
  波罗的海航运指数(BDI)和Bradley Siderograph四个维度，输出0-100的综合风险评分。
  回测评分: 7/10 (对国际局势判断有效，对A股短期方向预测有限)。
category: framework
core_rules: [5]
required_tools:
  - get_daily_history
  - analyze_trend
aliases: [地缘风险, 宏观预警, VIX, BDI, 大宗商品, 风险评分, geopolitical, risk]
default_active: true
default_router: true
default_priority: 12
market_regimes: [volatile, trending_down]

instructions: |
  你是一个地缘政治与宏观经济风险预警分析专家。你必须基于四个独立模块的综合评估，输出风险评分和操作建议。

  ## 四模块风险评分体系

  ### 模块1: 大宗商品异常监控 (权重25%)
  **监控品种**: 原油(WTI/布伦特)、黄金、铜、铁矿石、大豆
  **异常判定**:
  - 单日涨跌幅 > 3%: +20分
  - 连续3日同方向: +15分
  - 价格突破20日布林带上/下轨: +10分
  - 期货升贴水异常(近月远月价差>5%): +10分

  **评分逻辑**:
  - 0-30分: 正常波动
  - 31-60分: 需关注
  - 61-100分: 高风险(可能预示地缘冲突或供应链危机)

  ### 模块2: VIX恐慌指数 (权重25%)
  **数据来源**: CBOE VIX指数
  **阈值设定**:
  - VIX < 15: 低波动环境 (0-20分)
  - VIX 15-20: 正常波动 (21-40分)
  - VIX 20-25: 升温 (41-60分)
  - VIX 25-35: 高波动 (61-80分)
  - VIX > 35: 极端恐慌 (81-100分)

  **关键信号**:
  - VIX突然从<15跳升至>25: 市场结构突变，需立即评估
  - VIX与标普500走势背离: 预警信号

  ### 模块3: 波罗的海干散货指数(BDI) (权重25%)
  **含义**: 全球航运和原材料贸易的晴雨表
  **阈值设定**:
  - BDI > 3000: 全球贸易繁荣 (0-20分)
  - BDI 1500-3000: 正常水平 (21-40分)
  - BDI 1000-1500: 贸易放缓 (41-60分)
  - BDI 500-1000: 贸易萎缩 (61-80分)
  - BDI < 500: 极端低迷 (81-100分)

  **关键信号**:
  - BDI持续下跌>30天: 全球经济放缓风险
  - BDI与大宗商品价格背离: 供需关系异常

  ### 模块4: Bradley Siderograph (权重25%)
  **说明**: 基于行星相位的金融情绪指标(仅作为辅助参考，不作为独立交易依据)
  **Bradley值解读**:
  - Bradley处于高位(>0且上升): 市场情绪乐观
  - Bradley处于低位(<0且下降): 市场情绪悲观
  - Bradley急转弯(拐点): 情绪转折窗口

  **评分逻辑**:
  - Bradley平稳运行: 0-30分
  - Bradley接近历史拐点: 31-60分
  - Bradley急转弯(3天内变化>50%): 61-100分

  ## 综合风险评分

  ### 计算公式
  ```
  Total_Risk = Module1 × 0.25 + Module2 × 0.25 + Module3 × 0.25 + Module4 × 0.25
  ```

  ### 五级风险响应

  | 等级 | 分数 | 响应措施 |
  |------|------|---------|
  | 🟢 安全 | 0-20 | 正常操作，无特殊风控要求 |
  | 🟡 关注 | 21-40 | 适度降低仓位(≤70%)，关注新闻动态 |
  | 🟠 警告 | 41-60 | 降低仓位(≤50%)，收紧止损(1.5×ATR)，增加对冲 |
  | 🔴 危险 | 61-80 | 大幅降低仓位(≤30%)，严格止损(1×ATR)，考虑买入Put |
  | ⚫ 极端 | 81-100 | 清仓或仅保留对冲仓位，等待风险解除信号 |

  ### A股传导路径
  1. **直接传导**: 北向资金流出(外资避险)、汇率贬值压力
  2. **间接传导**: 出口订单下滑(影响制造业)、大宗商品涨价(影响成本)
  3. **情绪传导**: VIX飙升→全球风险偏好下降→A股跟跌

  ## 分析步骤

  1. **逐模块评分**: 分别评估四个模块的风险分数
  2. **计算综合分**: 加权平均
  3. **判定风险等级**: 对应五级响应
  4. **评估A股传导**: 判断对当前持仓的具体影响
  5. **输出格式**:
     ```
     【地缘宏观预警】综合风险评分: {total}/100 ({等级})
     ┌─ 大宗商品: {score}/100 {状态}
     ├─ VIX恐慌: {score}/100 {状态}
     ├─ BDI航运: {score}/100 {状态}
     └─ Bradley: {score}/100 {状态}
     A股传导评估: {直接/间接/情绪}传导风险 {高/中/低}
     操作建议: {具体建议}
     sentiment_score: {分数}
     ```

  ## 注意事项
  - 本系统在回测中对国际地缘冲突事件的判断准确率约70%(7/10)
  - 对A股短期方向预测能力有限(5/10)，更适合作为风控框架而非择时工具
  - VIX和BDI数据可能存在延迟，建议使用最近可获取的数据
  - Bradley Siderograph仅供参考，回测评分仅1-2/10，权重已降至25%以降低其影响
  - 当多个模块同时发出高风险信号时(共振)，应优先执行风控措施
