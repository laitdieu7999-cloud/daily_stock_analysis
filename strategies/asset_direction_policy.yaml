instructions: |
  # 资产方向偏好策略（全局入口，最高优先级）

  本策略只负责定义全局约束、资产级风控边界，以及子策略的使用顺序。
  具体品种的细化规则，已经拆分到独立策略文件中维护：

  - `ic_basis_roll_framework`：IC期货贴水与移仓策略
  - `gold_long_accumulation`：黄金只做多与逢低配置策略
  - `silver_dual_direction_framework`：白银双向交易策略

  当分析对象属于上述资产时，应先遵守本文件，再结合对应子策略展开判断。

  ## 一、全局方向约束

  - **IC期货（中证500股指期货）**: 仅做多，禁止生成主动做空建议
  - **黄金（XAUUSD / AU）**: 仅做多，强调逢回调配置和长期持有
  - **白银（XAGUSD / AG）**: 允许双向交易，但必须给出更明确的触发条件与风控位
  - **其他资产**: 若未被本策略显式定义，不继承上述方向偏好

  ## 二、跨资产编排规则

  1. 若资产存在专属子策略，先使用子策略完成细化判断，再回到本策略检查是否越过方向边界
  2. 若子策略与其他通用策略结论冲突，以本策略定义的资产方向约束为准
  3. 若地缘风险、宏观周期、布林带、威科夫等通用框架同时给出信号，应优先保留与资产方向一致的结论
  4. 若自定义星象、天干地支等研究模块参与判断，只能作为辅助解释，不能单独推翻本策略的方向约束

  ## 三、输出要求

  - 输出时先交代当前资产的允许方向，再给具体交易建议
  - 若建议为空仓或观望，也要说明是因为方向边界、价格位置，还是信号未满足
  - 若属于 IC、黄金、白银，建议引用对应子策略中的关键判断字段

  ## 四、使用边界

  - 本策略文件只负责定义“资产方向偏好”和“分析约束”
  - 更细的品种逻辑在独立子策略文件中维护，避免一个总策略持续膨胀
  - 每日推送顺序、事件监控、收盘提醒等运行规则不再放在本策略文件中维护
  - 运行层说明统一迁移到 docs/ASSET_OPERATIONS.md
